# =============================================================================
# service-emploi-du-temps — Stack Docker Compose (Phase 2)
# Microservice : emplois du temps (REST /api/emploi-du-temps)
# Dépend des services catalogue et locaux (appels HTTP inter-conteneurs)
# =============================================================================
#
# Usage standalone :
#   cd service-emploi-du-temps && docker compose up --build -d
#   (nécessite catalogue + locaux sur le même réseau planification-net)
#
# Port hôte : 8083 → conteneur 8080 (WildFly)
# =============================================================================

services:
  # --- Base de données MySQL -------------------------------------------------
  emploi-db:
    image: mysql:8.0
    container_name: emploi-db
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: emploi_db
      MYSQL_USER: emploi_user
      MYSQL_PASSWORD: emploi_pass
    volumes:
      - emploi-data:/var/lib/mysql
      # Pas de init.sql : la base emploi stocke les plannings générés dynamiquement
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - planification-net

  # --- Application WildFly ---------------------------------------------------
  service-emploi-du-temps:
    build: .
    container_name: service-emploi-du-temps
    ports:
      - "8083:8080"               # API accessible sur http://localhost:8083/api/emploi-du-temps
    environment:
      DATASOURCE_NAME: EmploiDS
      DB_HOST: emploi-db
      DB_PORT: "3306"
      DB_NAME: emploi_db
      DB_USER: emploi_user
      DB_PASSWORD: emploi_pass
      # URLs des microservices amont (résolution DNS interne Docker)
      CATALOGUE_BASE_URL: http://service-catalogue:8080
      LOCAUX_BASE_URL: http://service-locaux:8080
    depends_on:
      emploi-db:
        condition: service_healthy
      # Note : depends_on catalogue/locaux défini dans compose.yaml racine
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/emploi-du-temps"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 60s
    networks:
      - planification-net

volumes:
  emploi-data:

networks:
  planification-net:
    name: planification-net
    driver: bridge
