# =============================================================================
# StatefulSet — locaux-db (MySQL 8.0)
# =============================================================================
#
# Base de données persistante du microservice locaux.
# Équivalent Docker Compose : service locaux-db + volume locaux-data.
#
# Persistance : PVC 1Gi + ConfigMap locaux-db-init (init.sql)
# Credentials : Secret locaux-db-secret
# =============================================================================

apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: locaux-db
  namespace: planification
  labels:
    app: locaux-db
spec:
  serviceName: locaux-db
  replicas: 1
  selector:
    matchLabels:
      app: locaux-db
  template:
    metadata:
      labels:
        app: locaux-db
    spec:
      containers:
        - name: mysql
          image: mysql:8.0
          ports:
            - containerPort: 3306
              name: mysql
          envFrom:
            - secretRef:
                name: locaux-db-secret
          volumeMounts:
            - name: data
              mountPath: /var/lib/mysql
            - name: init-scripts
              mountPath: /docker-entrypoint-initdb.d

          livenessProbe:
            exec:
              command:
                - sh
                - -c
                - mysqladmin ping -h localhost -uroot -p$MYSQL_ROOT_PASSWORD
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 5

          readinessProbe:
            exec:
              command:
                - sh
                - -c
                - mysqladmin ping -h localhost -uroot -p$MYSQL_ROOT_PASSWORD
            initialDelaySeconds: 15
            periodSeconds: 5
            timeoutSeconds: 3

          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"

      volumes:
        - name: init-scripts
          configMap:
            name: locaux-db-init

  volumeClaimTemplates:
    - metadata:
        name: data
        labels:
          app: locaux-db
      spec:
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: 1Gi
