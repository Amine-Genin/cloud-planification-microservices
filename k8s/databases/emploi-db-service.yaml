# =============================================================================
# Service headless — emploi-db (MySQL)
# =============================================================================
#
# Service headless requis par le StatefulSet emploi-db.
# DNS stable : emploi-db-0.emploi-db.planification.svc — port 3306
# =============================================================================

apiVersion: v1
kind: Service
metadata:
  name: emploi-db
  namespace: planification
  labels:
    app: emploi-db
spec:
  type: ClusterIP
  ports:
    - name: mysql
      port: 3306
      targetPort: 3306
  selector:
    app: emploi-db
  clusterIP: None
