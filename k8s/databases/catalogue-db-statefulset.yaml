# =============================================================================
# StatefulSet — catalogue-db (MySQL 8.0)
# =============================================================================
#
# Base de données persistante du microservice catalogue.
# Équivalent Docker Compose : service catalogue-db + volume catalogue-data.
#
# Persistance :
#   - volumeClaimTemplates : PVC dynamique 1Gi (ReadWriteOnce)
#   - ConfigMap catalogue-db-init : script init.sql monté dans /docker-entrypoint-initdb.d
#
# Credentials : Secret catalogue-db-secret (envFrom)
# =============================================================================

apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: catalogue-db
  namespace: planification
  labels:
    app: catalogue-db
spec:
  serviceName: catalogue-db          # Doit correspondre au Service headless
  replicas: 1
  selector:
    matchLabels:
      app: catalogue-db
  template:
    metadata:
      labels:
        app: catalogue-db
    spec:
      containers:
        - name: mysql
          image: mysql:8.0
          ports:
            - containerPort: 3306
              name: mysql
          envFrom:
            - secretRef:
                name: catalogue-db-secret    # MYSQL_ROOT_PASSWORD, MYSQL_DATABASE, etc.
          volumeMounts:
            - name: data
              mountPath: /var/lib/mysql      # Données persistantes MySQL
            - name: init-scripts
              mountPath: /docker-entrypoint-initdb.d   # Exécuté au premier démarrage

          livenessProbe:
            exec:
              command:
                - sh
                - -c
                - mysqladmin ping -h localhost -uroot -p$MYSQL_ROOT_PASSWORD
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 5

          readinessProbe:
            exec:
              command:
                - sh
                - -c
                - mysqladmin ping -h localhost -uroot -p$MYSQL_ROOT_PASSWORD
            initialDelaySeconds: 15
            periodSeconds: 5
            timeoutSeconds: 3

          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"

      volumes:
        - name: init-scripts
          configMap:
            name: catalogue-db-init        # Généré par kustomization.yaml

  # PVC automatique par replica (catalogue-db-0 → data-catalogue-db-0)
  volumeClaimTemplates:
    - metadata:
        name: data
        labels:
          app: catalogue-db
      spec:
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: 1Gi
