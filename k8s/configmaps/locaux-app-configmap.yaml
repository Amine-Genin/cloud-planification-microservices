# =============================================================================
# ConfigMap — Variables d'environnement service-locaux (non sensibles)
# =============================================================================
#
# Injecté dans le Deployment via envFrom.
# Le mot de passe DB provient du Secret locaux-db-secret.
# Lu par docker/entrypoint.sh pour configurer la datasource WildFly LocauxDS.
# =============================================================================

apiVersion: v1
kind: ConfigMap
metadata:
  name: locaux-app-config
  namespace: planification
  labels:
    app: service-locaux
data:
  DATASOURCE_NAME: LocauxDS
  DB_HOST: locaux-db
  DB_PORT: "3306"
  DB_NAME: locaux_db
  DB_USER: locaux_user
