# =============================================================================
# Namespace Kubernetes — Isolation logique de la stack planification
# =============================================================================
#
# Regroupe toutes les ressources du projet (DB, apps, secrets, ingress)
# dans un espace de noms dédié pour faciliter la gestion et le nettoyage :
#   kubectl delete namespace planification
# =============================================================================

apiVersion: v1
kind: Namespace
metadata:
  name: planification
  labels:
    app.kubernetes.io/part-of: ump-planification
    app.kubernetes.io/managed-by: kustomize
