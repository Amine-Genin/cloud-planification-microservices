# =============================================================================
# Service ClusterIP — service-emploi-du-temps
# =============================================================================
#
# Expose le Deployment service-emploi-du-temps en interne au cluster.
# DNS interne : service-emploi-du-temps.planification.svc.cluster.local:8080
# =============================================================================

apiVersion: v1
kind: Service
metadata:
  name: service-emploi-du-temps
  namespace: planification
  labels:
    app: service-emploi-du-temps
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 8080
      targetPort: 8080
  selector:
    app: service-emploi-du-temps
