# =============================================================================
# Service ClusterIP — service-locaux
# =============================================================================
#
# Expose le Deployment service-locaux en interne au cluster.
# DNS interne : service-locaux.planification.svc.cluster.local:8080
# =============================================================================

apiVersion: v1
kind: Service
metadata:
  name: service-locaux
  namespace: planification
  labels:
    app: service-locaux
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 8080
      targetPort: 8080
  selector:
    app: service-locaux
