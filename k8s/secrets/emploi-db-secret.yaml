# =============================================================================
# Secret — Identifiants MySQL emploi-db
# =============================================================================
#
# Contient les credentials de la base emploi (root + user applicatif).
# Utilisé par le StatefulSet emploi-db et le Deployment service-emploi-du-temps.
# =============================================================================

apiVersion: v1
kind: Secret
metadata:
  name: emploi-db-secret
  namespace: planification
  labels:
    app: emploi-db
type: Opaque
stringData:
  MYSQL_ROOT_PASSWORD: root
  MYSQL_DATABASE: emploi_db
  MYSQL_USER: emploi_user
  MYSQL_PASSWORD: emploi_pass
