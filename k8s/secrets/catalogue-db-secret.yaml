# =============================================================================
# Secret — Identifiants MySQL catalogue-db
# =============================================================================
#
# Contient les credentials de la base catalogue (root + user applicatif).
# Utilisé par :
#   - StatefulSet catalogue-db (envFrom secretRef — variables MYSQL_*)
#   - Deployment service-catalogue (DB_PASSWORD via secretKeyRef)
#
# Note : stringData permet de saisir les valeurs en clair (encodées base64 à l'apply).
# En production, utiliser Sealed Secrets ou un gestionnaire de secrets externe.
# =============================================================================

apiVersion: v1
kind: Secret
metadata:
  name: catalogue-db-secret
  namespace: planification
  labels:
    app: catalogue-db
type: Opaque
stringData:
  MYSQL_ROOT_PASSWORD: root
  MYSQL_DATABASE: catalogue_db
  MYSQL_USER: catalogue_user
  MYSQL_PASSWORD: catalogue_pass
