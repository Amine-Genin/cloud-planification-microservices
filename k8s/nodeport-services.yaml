# Services NodePort — accès direct sans Ingress (optionnel)
# Ports alignés sur Docker Compose Phase 2 : 8081, 8082, 8083
---
apiVersion: v1
kind: Service
metadata:
  name: service-catalogue-nodeport
  namespace: planification
  labels:
    app: service-catalogue
spec:
  type: NodePort
  selector:
    app: service-catalogue
  ports:
    - name: http
      port: 8080
      targetPort: 8080
      nodePort: 30081
---
apiVersion: v1
kind: Service
metadata:
  name: service-locaux-nodeport
  namespace: planification
  labels:
    app: service-locaux
spec:
  type: NodePort
  selector:
    app: service-locaux
  ports:
    - name: http
      port: 8080
      targetPort: 8080
      nodePort: 30082
---
apiVersion: v1
kind: Service
metadata:
  name: service-emploi-du-temps-nodeport
  namespace: planification
  labels:
    app: service-emploi-du-temps
spec:
  type: NodePort
  selector:
    app: service-emploi-du-temps
  ports:
    - name: http
      port: 8080
      targetPort: 8080
      nodePort: 30083
