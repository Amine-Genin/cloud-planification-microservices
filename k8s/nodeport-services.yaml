# =============================================================================
# Services NodePort — Accès direct aux microservices sans Ingress
# =============================================================================
#
# Optionnel : permet d'accéder aux APIs depuis l'hôte via les ports NodePort.
# Ports alignés sur Docker Compose Phase 2 (8081→30081, 8082→30082, 8083→30083).
#
# Depuis Windows (via Vagrant port forward sur k3s-master) :
#   http://localhost:30081/api/cours
#   http://localhost:30082/api/locaux
#   http://localhost:30083/api/emploi-du-temps
#
# Note : 3 ressources Service séparées (documents multi-objets YAML avec ---)
# =============================================================================

---
# NodePort pour service-catalogue (port externe 30081)
apiVersion: v1
kind: Service
metadata:
  name: service-catalogue-nodeport
  namespace: planification
  labels:
    app: service-catalogue
spec:
  type: NodePort
  selector:
    app: service-catalogue       # Cible les pods du Deployment service-catalogue
  ports:
    - name: http
      port: 8080                 # Port du Service (interne cluster)
      targetPort: 8080           # Port du conteneur WildFly
      nodePort: 30081            # Port exposé sur chaque nœud du cluster

---
# NodePort pour service-locaux (port externe 30082)
apiVersion: v1
kind: Service
metadata:
  name: service-locaux-nodeport
  namespace: planification
  labels:
    app: service-locaux
spec:
  type: NodePort
  selector:
    app: service-locaux
  ports:
    - name: http
      port: 8080
      targetPort: 8080
      nodePort: 30082

---
# NodePort pour service-emploi-du-temps (port externe 30083)
apiVersion: v1
kind: Service
metadata:
  name: service-emploi-du-temps-nodeport
  namespace: planification
  labels:
    app: service-emploi-du-temps
spec:
  type: NodePort
  selector:
    app: service-emploi-du-temps
  ports:
    - name: http
      port: 8080
      targetPort: 8080
      nodePort: 30083
