# =============================================================================
# service-catalogue — Stack Docker Compose (Phase 2)
# Microservice : catalogue de cours (REST /api/cours)
# =============================================================================
#
# Usage standalone :
#   cd service-catalogue && docker compose up --build -d
#
# Port hôte : 8081 → conteneur 8080 (WildFly)
# =============================================================================

services:
  # --- Base de données MySQL -------------------------------------------------
  catalogue-db:
    image: mysql:8.0
    container_name: catalogue-db
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: catalogue_db
      MYSQL_USER: catalogue_user
      MYSQL_PASSWORD: catalogue_pass
    volumes:
      - catalogue-data:/var/lib/mysql                          # Persistance des données
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql        # Schéma + données initiales
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - planification-net

  # --- Application WildFly ---------------------------------------------------
  service-catalogue:
    build: .                    # Dockerfile multi-stage (Maven + WildFly)
    container_name: service-catalogue
    ports:
      - "8081:8080"               # API accessible sur http://localhost:8081/api/cours
    environment:
      DATASOURCE_NAME: CatalogueDS
      DB_HOST: catalogue-db       # Nom DNS interne Docker
      DB_PORT: "3306"
      DB_NAME: catalogue_db
      DB_USER: catalogue_user
      DB_PASSWORD: catalogue_pass
    depends_on:
      catalogue-db:
        condition: service_healthy   # Attend que MySQL soit prêt
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/cours"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 60s
    networks:
      - planification-net

volumes:
  catalogue-data:                 # Volume nommé pour persister la base MySQL

networks:
  planification-net:
    name: planification-net       # Réseau partagé avec les autres microservices
    driver: bridge
